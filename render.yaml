services:
  # 1. FastAPI Vector Backend Service
  - type: web
    name: cfa-tutor-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: true # Requires candidate to paste their key in the Render dashboard

  # 2. Vite React Frontend static site
  - type: web
    name: cfa-tutor-frontend
    env: static
    plan: free
    buildCommand: npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: cfa-tutor-backend
          type: web
          property: host
